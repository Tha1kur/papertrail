<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📎</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ask questions about your own documents and get answers with citations you can check." />
    <meta name="theme-color" content="#f7f4ef" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#101012" media="(prefers-color-scheme: dark)" />
    <title>PaperTrail</title>
    <script>
      // Applied before first paint so the page never renders in the wrong
      // theme and then snaps to the right one. Inline and synchronous
      // precisely because it must beat React mounting.
      (function () {
        try {
          var stored = localStorage.getItem("papertrail-theme");
          var dark = stored
            ? stored === "dark"
            : window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (dark) document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = dark ? "dark" : "light";
        } catch (e) {
          /* private mode can block localStorage; the default theme is fine */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
