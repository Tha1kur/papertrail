# Render blueprint for the API.
#
# Checked in so the deployment is reproducible and reviewable rather than a
# set of values someone typed into a dashboard once and cannot recall.

services:
  - type: web
    name: papertrail-api
    runtime: node
    plan: free
    region: singapore
    rootDir: server

    # --include=dev is load-bearing, not decorative.
    #
    # NODE_ENV=production is set below for the runtime, and npm reads it
    # during install too — so a plain `npm ci` skips devDependencies, which
    # is where typescript and every @types package lives. The build then
    # fails with ~90 "cannot find type definitions" errors that look like a
    # broken codebase rather than a missing install flag.
    #
    # The Dockerfile avoids this differently: its build stage never sets
    # NODE_ENV, and only the runtime stage does. Same principle, and it is
    # why the image built fine in CI while this did not.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start

    # Render restarts an instance that fails this. Liveness, not readiness:
    # readiness failing means "stop routing to me", and restarting on it turns
    # a brief database blip into a restart loop.
    healthCheckPath: /health/live

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        # Render injects the real port; the app reads it from the environment
        # rather than hardcoding 8080 as the original did.
        value: 8080

      # Secrets are set in the dashboard, never committed. sync:false stops
      # Render from expecting a value in this file.
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: SENTRY_DSN
        sync: false

      # The browser only ever talks to the Vercel origin, because Vercel
      # rewrites /api to this service. That keeps requests same-origin and the
      # auth cookies first-party. This value is the fallback for anything
      # calling the API host directly.
      - key: CORS_ORIGINS
        sync: false

      - key: LOG_LEVEL
        value: info

      # SENTRY_RELEASE is deliberately absent.
      #
      # It used to be wired via `fromService: property: commitId`, which
      # Render rejects — fromService only exposes connection details
      # (connectionString, host, hostport, port), not git metadata.
      #
      # Render already injects RENDER_GIT_COMMIT into every service built
      # from a repo, so config/env.ts falls back to it. Same result, one
      # fewer thing to configure, and it cannot drift from the deployed
      # commit because Render sets it.
