name: CI

on:
  push:
    branches: [main]
  pull_request:

# A new push to the same branch cancels the run already in progress. Without
# this, a burst of commits queues several full runs and the useful one — the
# latest — waits behind results nobody will read.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install
        working-directory: server
        # `ci` fails if the lockfile and package.json disagree, so a
        # dependency cannot drift between a developer's machine and CI.
        run: npm ci

      - name: Typecheck
        working-directory: server
        run: npm run typecheck

      - name: Test
        working-directory: server
        # No secrets. The suite runs against an in-memory MongoDB and a fake
        # language model, so it cannot reach a paid API or leak a key into a
        # log — which is what makes it safe to run on pull requests from
        # forks.
        run: npm test

  production-build:
    name: Production build (Render conditions)
    runs-on: ubuntu-latest

    # Reproduces the hosting environment rather than a developer's.
    #
    # The ordinary jobs install with NODE_ENV unset, so devDependencies are
    # always present and a build that depends on them looks fine. Render sets
    # NODE_ENV=production, npm then skips devDependencies, and the build died
    # with ~90 missing-type errors — a failure that only appeared on a real
    # deploy, which is the worst place to find it.
    env:
      NODE_ENV: production

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Build exactly as the host does
        working-directory: server
        run: npm ci --include=dev && npm run build

      - name: Start under production dependencies only
        working-directory: server
        # Having built, prune to what actually ships and confirm the compiled
        # output still boots. Catches a runtime import that was only ever
        # satisfied by a devDependency.
        run: |
          npm prune --omit=dev
          node -e "
            const { spawn } = require('node:child_process');
            const child = spawn('node', ['dist/server.js'], {
              env: { ...process.env, MONGODB_URI: 'mongodb://127.0.0.1:27017/x',
                     JWT_ACCESS_SECRET: 'x'.repeat(40),
                     GEMINI_API_KEY: 'x', GROQ_API_KEY: 'x' },
            });
            let out = '';
            const done = (code) => {
              // Connecting to a database that is not there is expected and
              // fine. A module resolution failure is not.
              if (/Cannot find (module|package)|ERR_MODULE_NOT_FOUND/.test(out)) {
                console.error('Missing runtime dependency:\n' + out);
                process.exit(1);
              }
              console.log('Compiled output loads with production dependencies only.');
              process.exit(0);
            };
            child.stdout.on('data', (d) => (out += d));
            child.stderr.on('data', (d) => (out += d));
            setTimeout(() => { child.kill(); done(); }, 12000);
            child.on('exit', done);
          "

  client:
    name: Client
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install
        working-directory: client
        run: npm ci

      - name: Lint
        working-directory: client
        run: npm run lint

      - name: Typecheck
        working-directory: client
        run: npm run typecheck

      - name: Build
        working-directory: client
        run: npm run build

  docker:
    name: Docker image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          # Built but not pushed. The point is to catch a Dockerfile that
          # stopped building — which otherwise surfaces during a deploy, at
          # the worst possible moment.
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Audit server
        working-directory: server
        # Production dependencies only, and only high severity. Auditing dev
        # dependencies produces a stream of advisories for build tooling that
        # never runs in production — and a check that always fails is a check
        # people learn to ignore.
        run: npm audit --omit=dev --audit-level=high

      - name: Audit client
        working-directory: client
        run: npm audit --omit=dev --audit-level=high
